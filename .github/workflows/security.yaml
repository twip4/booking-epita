---
name: security

on:
 workflow_dispatch

permissions:
 # Required to upload SARIF file to CodeQL.
 actions: read
 # Require writing security events to upload SARIF file
 security-events: write
 # to fetch code (actions/checkout)
 contents: read

name: run osv-scanner
  uses: google/osv-scanner-action/osv-scanner-action@1f1242919d8a60496dd1874b24b62b2370ed4c78
  with:
    scan-args: |-
      --format sarif
      --output DependenciesAnalysisFull.sarif
      ./
  continue-on-error: true

runs-on: ubuntu-latest
container:
 image: returntocorp/semgrep@fcd5ab7459e8d91cb1777481980d1b18b4fc6735
